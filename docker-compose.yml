version: '3.8'

services:
  api:
    build: .
    container_name: barberpole-api
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./barberpole.db:/app/barberpole.db
    environment:
      - DATABASE_URL=sqlite:///./barberpole.db
      - ENVIRONMENT=production
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - barberpole-network

networks:
  barberpole-network:
    driver: bridge
